schemaVersion: 2.2.2
metadata:
  name: comidas-gratis-fascinator
  version: 1.0.0
  description: comidas.gratis Deno workspace with Fascinator collaborative editing
attributes:
  controller.devfile.io/storage-type: ephemeral
  che-editor.yaml: |
    schemaVersion: 2.1.0
    metadata:
      name: che-code

components:
  - name: deno-dev
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 2Gi
      cpuLimit: "1"
      mountSources: true
      env:
        - name: DENO_INSTALL
          value: /home/user/.deno
        - name: PATH
          value: /home/user/.deno/bin:/home/user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3200"
        - name: FASCINATOR_DATA_DIR
          value: /projects/.fascinator-data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: deno-serve
          targetPort: 8000
          exposure: public
          protocol: https
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

commands:
  - id: fascinator-bootstrap
    exec:
      component: deno-dev
      commandLine: nohup /bin/bash -c '(test -d /projects/fascinator || git clone https://github.com/chapeaux/fascinator.git /projects/fascinator) && /bin/bash /projects/fascinator/scripts/setup.sh' > /tmp/fascinator-setup.log 2>&1 &
      workingDir: /projects
      group:
        kind: run
        isDefault: true

  - id: deno-run
    exec:
      component: deno-dev
      commandLine: deno task start
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run

  - id: deno-test
    exec:
      component: deno-dev
      commandLine: deno test
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: test
        isDefault: true

  - id: deno-fmt
    exec:
      component: deno-dev
      commandLine: deno fmt
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: false

  - id: deno-lint
    exec:
      component: deno-dev
      commandLine: deno lint
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: false

events:
  postStart:
    - fascinator-bootstrap
