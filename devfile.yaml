schemaVersion: 2.2.2
metadata:
  name: comidas-gratis-fascinator
  version: 1.0.0
  description: comidas.gratis Deno workspace with Fascinator collaborative editing
attributes:
  che-editor.yaml: |
    schemaVersion: 2.1.0
    metadata:
      name: che-code

projects:
  - name: fascinator
    git:
      remotes:
        origin: https://github.com/chapeaux/fascinator.git
      checkoutFrom:
        revision: main

components:
  - name: deno-dev
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4Gi
      cpuLimit: "2"
      mountSources: true
      env:
        - name: DENO_INSTALL
          value: /home/user/.deno
        - name: PATH
          value: /home/user/.deno/bin:/home/user/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: FASCINATOR_SERVER_PORT
          value: "3078"
        - name: FASCINATOR_MANAGER_PORT
          value: "3079"
        - name: FASCINATOR_HOST_PORT
          value: "3200"
        - name: FASCINATOR_DATA_DIR
          value: /projects/.fascinator-data
        - name: FASCINATOR_HOST_NAME
          value: Developer
      endpoints:
        - name: deno-serve
          targetPort: 8000
          exposure: public
          protocol: https
        - name: fascinator-mgr
          targetPort: 3079
          exposure: public
          protocol: https
        - name: fascinator-ws
          targetPort: 3078
          exposure: internal

commands:
  - id: setup-all
    exec:
      component: deno-dev
      commandLine: |
        export DENO_INSTALL=/home/user/.deno
        export PATH="$DENO_INSTALL/bin:/home/user/.local/bin:$PATH"
        curl -fsSL https://deno.land/install.sh | sh
        /projects/fascinator/scripts/setup.sh
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true

  - id: deno-run
    exec:
      component: deno-dev
      commandLine: deno task start
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true

  - id: deno-test
    exec:
      component: deno-dev
      commandLine: deno test
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: test
        isDefault: true

  - id: deno-fmt
    exec:
      component: deno-dev
      commandLine: deno fmt
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: false

  - id: deno-lint
    exec:
      component: deno-dev
      commandLine: deno lint
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: false

events:
  postStart:
    - setup-all
